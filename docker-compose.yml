services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5174:5173"
    environment:
      VITE_API_URL: http://localhost:8080/api
      VITE_HMR_CLIENT_PORT: 5174
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      PORT: 8080
      MONGO_URI: mongodb://mongo:27017/agricore
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: agricore
      POSTGRES_USER: agricore
      POSTGRES_PASSWORD: agricore_password
      CORS_ORIGIN: http://localhost:5174
      JWT_SECRET: local-development-secret-change-before-production
      JWT_EXPIRES_IN: 8h
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.5}
    depends_on:
      mongo:
        condition: service_started
      postgres:
        condition: service_healthy

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: agricore
      POSTGRES_USER: agricore
      POSTGRES_PASSWORD: agricore_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agricore -d agricore"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

volumes:
  mongo_data:
  postgres_data:
